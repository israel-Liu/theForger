name: Build and Deploy Hexo Blog

on:
  push:
    branches: [master]
    paths:
      - 'source/**'
      - '_config.yml'
      - '_config.butterfly.yml'
      - 'package.json'

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate static files
        run: npx hexo clean && npx hexo generate

      - name: Clone blog-images and copy to public
        run: |
          git clone --depth 1 https://github.com/israel-Liu/blog-images.git _blog_images
          mkdir -p public/images
          cp -r _blog_images/life _blog_images/daily _blog_images/food _blog_images/travel _blog_images/tech public/images/ 2>/dev/null || true
          rm -rf _blog_images
        env:
          GIT_TERMINAL_PROMPT: 0

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DEPLOY_TOKEN }}
          external_repository: israel-Liu/israel-Liu.github.io
          publish_branch: master
          publish_dir: ./public
          commit_message: 'deploy: ${{ github.event.head_commit.message }}'
