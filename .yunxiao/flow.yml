name: Build and Deploy Hexo Blog (Codeup)

triggers:
  push:
    branches:
      include:
        - master
    paths:
      include:
        - source/**
        - _config.yml
        - _config.butterfly.yml
        - package.json

stages:
  - name: build
    displayName: 构建 Hexo 博客
    steps:
      - uses: checkout
      - uses: node
        with:
          nodeVersion: "20"
      - run: npm ci
        displayName: 安装依赖
      - run: npx hexo clean && npx hexo generate
        displayName: 生成静态文件
      - uses: upload-artifact
        with:
          name: public
          path: public/

  - name: deploy
    displayName: 部署到 OSS
    dependsOn: build
    steps:
      - uses: download-artifact
        with:
          name: public
          path: public/
      - uses: aliyun-oss-deploy
        with:
          accessKeyId: ${ALIYUN_AK_ID}
          accessKeySecret: ${ALIYUN_AK_SECRET}
          bucket: ${OSS_BUCKET}
          region: cn-shanghai
          sourceDir: public/
          targetDir: /
